worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;

    log_format main '$remote_addr [$time_local] "$request" $status upstream="$upstream_addr"';
    access_log /var/log/nginx/access.log main;

    # ── Pool frontends (round-robin least_conn) ──────────
    upstream frontend_pool {
        least_conn;
        server animeguesser_app_front_1:80 weight=1 max_fails=3 fail_timeout=30s;
        server animeguesser_app_front_2:80 weight=1 max_fails=3 fail_timeout=30s;
    }

    # ── Backend Laravel ──────────────────────────────────
    upstream backend_pool {
        server backend:10000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        location /lb-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # API → Laravel
        location /api/ {
            proxy_pass         http://backend_pool;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # Frontend → pool
        location / {
            proxy_pass         http://frontend_pool;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
