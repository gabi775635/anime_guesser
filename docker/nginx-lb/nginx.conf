worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    gzip on;

    # ── Upstream frontends (round-robin) ────
    upstream frontend_pool {
        least_conn;
        server frontend-1:80 weight=1 max_fails=3 fail_timeout=30s;
        server frontend-2:80 weight=1 max_fails=3 fail_timeout=30s;
        # Les instances dynamiques sont injectées ici par le dashboard
        # DYNAMIC_UPSTREAMS
    }

    # ── Upstream backend ────────────────────
    upstream backend_pool {
        server backend:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Health check du load balancer
        location /lb-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # API → backend Laravel
        location /api/ {
            proxy_pass         http://backend_pool;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;

            # CORS pour Tauri / dev local
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # Frontend → pool
        location / {
            proxy_pass         http://frontend_pool;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
