<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnimeGuesser — Statistiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="main">
    <div class="page">
      <div class="page-header">
        <div class="page-title">Statistiques globales</div>
        <div class="page-subtitle">Activité joueurs sur les 30 derniers jours</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Inscriptions (30j)</div><div class="stat-value accent" id="stats-registrations">—</div></div>
        <div class="stat-card"><div class="stat-label">Parties jouées (30j)</div><div class="stat-value teal" id="stats-games">—</div></div>
        <div class="stat-card"><div class="stat-label">Score moyen</div><div class="stat-value gold" id="stats-avg-score">—</div></div>
        <div class="stat-card"><div class="stat-label">Durée moy. session</div><div class="stat-value blue" id="stats-avg-duration">—</div></div>
      </div>
      <div class="chart-card section-gap">
        <div class="chart-title">Parties jouées par jour</div>
        <div class="sparkline" id="chart-games-daily" style="height:80px"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Inscriptions par jour</div>
        <div class="sparkline" id="chart-registrations-daily" style="height:80px"></div>
      </div>
    </div>
  </main>
</div>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
injectSidebar();
initSidebar('admin-stats');

async function loadAdminStats() {
  try {
    const data = await api('GET', '/metrics/players?days=30');
    const total_reg   = data.reduce((s, d) => s + d.new_registrations, 0);
    const total_games = data.reduce((s, d) => s + d.games_played, 0);
    const avg_score   = Math.round(data.reduce((s, d) => s + (d.avg_score ?? 0), 0) / (data.length || 1));
    const avg_dur     = Math.round(data.reduce((s, d) => s + (d.avg_session_duration_s ?? 0), 0) / (data.length || 1));

    document.getElementById('stats-registrations').textContent = total_reg;
    document.getElementById('stats-games').textContent         = total_games.toLocaleString();
    document.getElementById('stats-avg-score').textContent     = avg_score.toLocaleString();
    document.getElementById('stats-avg-duration').textContent  = formatDuration(avg_dur);

    renderSparkline('chart-games-daily',         data.map(d => d.games_played),      'var(--teal)');
    renderSparkline('chart-registrations-daily', data.map(d => d.new_registrations), 'var(--accent)');
  } catch (e) {}
}
loadAdminStats();
</script>
</body>
</html>
