<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnimeGuesser — Gestion des animés</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="main">
    <div class="page">
      <div class="flex-between">
        <div class="page-header" style="margin-bottom:0">
          <div class="page-title">Gestion des animés</div>
        </div>
        <button class="btn btn-primary" onclick="openAnimeModal()">+ Ajouter</button>
      </div>
      <div style="margin-top:24px" class="table-wrap">
        <table>
          <thead><tr><th>Titre</th><th>Année</th><th>Genre</th><th>Difficulté</th><th>Actions</th></tr></thead>
          <tbody id="animes-body">
            <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:32px"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL ANIME -->
<div class="modal-overlay" id="modal-anime">
  <div class="modal">
    <div class="modal-title" id="anime-modal-title">Ajouter un animé</div>
    <input type="hidden" id="anime-edit-id" />
    <div class="form-group"><label class="form-label">Titre</label><input id="anime-title" class="form-input" type="text" /></div>
    <div class="form-group"><label class="form-label">Synopsis</label><textarea id="anime-synopsis" class="form-input" rows="3"></textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Année</label><input id="anime-year" class="form-input" type="number" /></div>
      <div class="form-group"><label class="form-label">Genre</label><input id="anime-genre" class="form-input" type="text" /></div>
      <div class="form-group"><label class="form-label">Studio</label><input id="anime-studio" class="form-input" type="text" /></div>
      <div class="form-group">
        <label class="form-label">Difficulté</label>
        <select id="anime-difficulty" class="form-input">
          <option value="facile">Facile</option>
          <option value="moyen" selected>Moyen</option>
          <option value="difficile">Difficile</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">URL image</label><input id="anime-image" class="form-input" type="url" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-anime')">Annuler</button>
      <button class="btn btn-primary" onclick="saveAnime()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
injectSidebar();
initSidebar('mod-animes');

async function loadModAnimes() {
  try {
    const data = await api('GET', '/animes');
    const list = data.data || data;
    document.getElementById('animes-body').innerHTML = list.map(a => `
      <tr>
        <td><strong>${esc(a.title)}</strong></td>
        <td>${a.year ?? '—'}</td>
        <td>${esc(a.genre ?? '—')}</td>
        <td><span class="badge ${a.difficulty === 'facile' ? 'badge-ok' : a.difficulty === 'moyen' ? 'badge-warn' : 'badge-admin'}">${a.difficulty}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick='openAnimeModal(${JSON.stringify(a)})'>Éditer</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAnime(${a.id})">Suppr.</button>
        </td>
      </tr>`).join('') || '<tr><td colspan="5" style="color:var(--text3);text-align:center;padding:24px">Aucun animé</td></tr>';
  } catch (e) {}
}

function openAnimeModal(anime = null) {
  document.getElementById('anime-edit-id').value    = anime?.id ?? '';
  document.getElementById('anime-modal-title').textContent = anime ? "Modifier l'animé" : 'Ajouter un animé';
  document.getElementById('anime-title').value      = anime?.title ?? '';
  document.getElementById('anime-synopsis').value   = anime?.synopsis ?? '';
  document.getElementById('anime-year').value       = anime?.year ?? '';
  document.getElementById('anime-genre').value      = anime?.genre ?? '';
  document.getElementById('anime-studio').value     = anime?.studio ?? '';
  document.getElementById('anime-difficulty').value = anime?.difficulty ?? 'moyen';
  document.getElementById('anime-image').value      = anime?.image_url ?? '';
  document.getElementById('modal-anime').classList.add('open');
}

async function saveAnime() {
  const id = document.getElementById('anime-edit-id').value;
  const body = {
    title:      document.getElementById('anime-title').value,
    synopsis:   document.getElementById('anime-synopsis').value,
    year:       document.getElementById('anime-year').value || null,
    genre:      document.getElementById('anime-genre').value,
    studio:     document.getElementById('anime-studio').value,
    difficulty: document.getElementById('anime-difficulty').value,
    image_url:  document.getElementById('anime-image').value,
  };
  try {
    if (id) await api('PUT', `/animes/${id}`, body);
    else    await api('POST', '/animes', body);
    closeModal('modal-anime');
    loadModAnimes();
  } catch (e) { alert('Erreur: ' + e.message); }
}

async function deleteAnime(id) {
  if (!confirm('Supprimer cet animé ?')) return;
  await api('DELETE', `/animes/${id}`).catch(e => alert(e.message));
  loadModAnimes();
}

loadModAnimes();
</script>
</body>
</html>
