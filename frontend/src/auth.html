<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnimeGuesser — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
.auth-card {
  width: 400px; background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 40px;
}
.auth-logo { font-family: var(--font-display); font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 32px; }
.auth-logo span { color: var(--accent); }
.auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius); padding: 4px; margin-bottom: 28px; }
.auth-tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text2); transition: all .15s; }
.auth-tab.active { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">Anime<span>Guesser</span></div>
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchAuthTab('login')">Connexion</div>
    <div class="auth-tab" onclick="switchAuthTab('register')">Inscription</div>
  </div>
  <div id="auth-alert"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Pseudo ou email</label>
      <input id="login-input" class="form-input" type="text" placeholder="naruto_fan" />
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input id="login-password" class="form-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Se connecter</button>
  </div>

  <!-- REGISTER -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label class="form-label">Pseudo</label>
      <input id="reg-pseudo" class="form-input" type="text" placeholder="naruto_fan" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="reg-email" class="form-input" type="email" placeholder="moi@exemple.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input id="reg-password" class="form-input" type="password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer</label>
      <input id="reg-password-confirm" class="form-input" type="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">Créer mon compte</button>
  </div>
  <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:16px;">
    Test: admin / Admin1234! · naruto_fan / Pass1234!
  </p>
</div>

<script src="shared.js"></script>
<script>
// If already logged in, redirect
if (token && currentUser) window.location.href = 'home.html';

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-alert').innerHTML = '';
}

function authAlert(msg, type = 'error') {
  document.getElementById('auth-alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const login    = document.getElementById('login-input').value.trim();
  const password = document.getElementById('login-password').value;
  if (!login || !password) return authAlert('Remplis tous les champs.');
  try {
    const data = await api('POST', '/login', { login, password });
    setSession(data.token, data.user);
    window.location.href = 'home.html';
  } catch (e) { authAlert(e.message); }
}

async function doRegister() {
  const pseudo               = document.getElementById('reg-pseudo').value.trim();
  const email                = document.getElementById('reg-email').value.trim();
  const password             = document.getElementById('reg-password').value;
  const password_confirmation = document.getElementById('reg-password-confirm').value;
  if (!pseudo || !email || !password) return authAlert('Remplis tous les champs.');
  if (password !== password_confirmation) return authAlert('Les mots de passe ne correspondent pas.');
  try {
    const data = await api('POST', '/register', { pseudo, email, password, password_confirmation });
    setSession(data.token, data.user);
    window.location.href = 'home.html';
  } catch (e) { authAlert(e.message); }
}
</script>
</body>
</html>
