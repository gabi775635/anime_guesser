<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnimeGuesser — Jeu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
#main { overflow-y: auto; }
.game-container { max-width: 700px; margin: 0 auto; padding: 40px; }

/* Score tracker */
.score-tracker {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 24px;
}
.score-main {
  display: flex; flex-direction: column; align-items: center; min-width: 90px;
}
.score-current {
  font-family: var(--font-display); font-size: 40px; font-weight: 800;
  line-height: 1; transition: color .4s;
}
.score-max { font-size: 12px; color: var(--text3); margin-top: 2px; }
.score-bar-wrap { flex: 1; }
.score-bar-track {
  width: 100%; height: 12px; background: var(--bg3);
  border-radius: 6px; overflow: hidden;
}
.score-bar-fill {
  height: 100%; border-radius: 6px;
  transition: width .5s cubic-bezier(.4,0,.2,1), background .5s;
}
.score-rank-display {
  font-family: var(--font-display); font-size: 28px; font-weight: 800;
  letter-spacing: 2px; min-width: 36px; text-align: center;
  transition: color .4s;
}

/* Round history strip */
.round-history {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.round-dot {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  border: 2px solid transparent; transition: all .3s;
}
.round-dot.correct  { background: rgba(0,212,170,0.15); border-color: var(--teal); color: var(--teal); }
.round-dot.wrong    { background: rgba(232,54,93,0.12);  border-color: var(--accent); color: var(--accent2); }
.round-dot.skipped  { background: rgba(150,150,150,0.08); border-color: var(--text3); color: var(--text3); }
.round-dot.pending  { background: var(--surface2); border-color: var(--border2); color: var(--text3); }
.round-dot.current  { border-color: var(--gold); color: var(--gold); animation: pulse-dot .8s ease-in-out infinite alternate; }
@keyframes pulse-dot { from { opacity: 1; } to { opacity: 0.5; } }

/* Game header */
.game-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.game-progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; margin: 0 16px; overflow: hidden; }
.game-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

.game-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px;
}
.game-image { width: 100%; height: 280px; object-fit: cover; display: block; filter: blur(0); transition: filter .3s; }
.game-image.blurred { filter: blur(20px) brightness(0.6); }
.game-text-content { padding: 28px; }
.game-mode-badge {
  display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 16px;
  background: rgba(232,54,93,0.15); color: var(--accent2); border: 1px solid rgba(232,54,93,0.25);
}
.game-question { font-size: 16px; line-height: 1.7; color: var(--text2); }

.answer-form { display: flex; gap: 12px; }
.answer-input { flex: 1; }
.answer-feedback {
  padding: 16px 20px; border-radius: var(--radius); font-weight: 500; font-size: 15px;
  display: none; align-items: center; gap: 10px; margin-bottom: 16px;
}
.answer-feedback.correct { background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--teal); display: flex; }
.answer-feedback.wrong   { background: rgba(232,54,93,0.1);  border: 1px solid rgba(232,54,93,0.3);  color: var(--accent2); display: flex; }

.timer-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
.timer-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .1s linear, background .5s; }

/* End screen */
#end-screen {
  display: none; text-align: center; padding: 40px;
}
.end-score-big {
  font-family: var(--font-display); font-size: 80px; font-weight: 800;
  line-height: 1; margin: 16px 0 4px;
  transition: color .4s;
}
.end-rank-big {
  font-family: var(--font-display); font-size: 48px; font-weight: 800;
  letter-spacing: 4px; margin-bottom: 8px;
}
.end-history-wrap { margin: 24px 0; }
.end-history { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.end-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 13px; text-align: left; min-width: 120px;
}
.end-item-pts { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
.end-item-label { color: var(--text3); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="main">
    <div class="game-container">

      <!-- Score Tracker -->
      <div class="score-tracker" id="score-tracker">
        <div class="score-main">
          <div class="score-current" id="score-current">0</div>
          <div class="score-max">/ 1000</div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-track">
            <div class="score-bar-fill" id="score-bar" style="width:0%;background:var(--score-d)"></div>
          </div>
          <div class="round-history" id="round-history"></div>
        </div>
        <div class="score-rank-display rank-d" id="score-rank">D</div>
      </div>

      <!-- Game area -->
      <div id="game-area">
        <div class="game-header">
          <span id="game-round-label" style="font-size:13px;color:var(--text3)">Round 1/10</span>
          <div class="game-progress-bar"><div class="game-progress-fill" id="game-progress" style="width:0%"></div></div>
          <span style="font-size:13px;color:var(--text3)" id="game-mode-label">—</span>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
        <div class="game-card" id="game-card">
          <div id="game-image-wrap" style="display:none">
            <img id="game-image" class="game-image blurred" src="" alt="Anime" />
          </div>
          <div class="game-text-content">
            <div class="game-mode-badge" id="game-mode-badge">Description</div>
            <p class="game-question" id="game-question">Chargement...</p>
          </div>
        </div>
        <div class="answer-feedback" id="answer-feedback"></div>
        <div class="answer-form">
          <input id="answer-input" class="form-input answer-input" type="text" placeholder="Quel animé est-ce ?" autocomplete="off" onkeydown="if(event.key==='Enter')submitAnswer()" />
          <button class="btn btn-primary" onclick="submitAnswer()">Répondre</button>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button class="btn btn-ghost btn-sm" onclick="skipRound()">Passer ⏭</button>
          <button class="btn btn-ghost btn-sm" onclick="endGame()">Quitter ✕</button>
        </div>
      </div>

      <!-- End screen -->
      <div id="end-screen">
        <div style="font-family:var(--font-display);font-size:18px;color:var(--text2)">Partie terminée !</div>
        <div class="end-score-big" id="end-score">0</div>
        <div class="end-rank-big" id="end-rank">D</div>
        <div style="color:var(--text3);font-size:14px" id="end-summary">— bonnes réponses sur 10</div>
        <div class="end-history-wrap">
          <div class="end-history" id="end-history"></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
          <button class="btn btn-primary" onclick="replayGame()">Rejouer</button>
          <a class="btn btn-ghost" href="home.html">Accueil</a>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
injectSidebar();
initSidebar('game');

const TOTAL_ROUNDS = 10;
const MAX_SCORE_PER_ROUND = 100; // 10 rounds × 100 = 1000 max

let gameSession = {
  id: null, mode: null, round: null,
  score: 0, roundNum: 0, total: TOTAL_ROUNDS,
  timer: null, startTime: null,
  history: [] // [{correct, points, answer, correctAnswer}]
};

// ── INIT ──
const mode = new URLSearchParams(location.search).get('mode') || 'description';
startGame(mode);

async function startGame(mode) {
  gameSession = { id: null, mode, round: null, score: 0, roundNum: 0, total: TOTAL_ROUNDS, timer: null, startTime: null, history: [] };
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('game-mode-label').textContent = mode;
  document.getElementById('answer-feedback').className = 'answer-feedback';
  renderHistory();
  updateScoreDisplay();

  try {
    const s = await api('POST', '/game/session/start', { mode });
    gameSession.id = s.session_id;
    await loadNextRound();
  } catch (e) { showFeedback('Erreur: ' + e.message, false); }
}

async function loadNextRound() {
  gameSession.roundNum++;
  if (gameSession.roundNum > gameSession.total) return showEndScreen();

  document.getElementById('game-round-label').textContent = `Round ${gameSession.roundNum}/${gameSession.total}`;
  document.getElementById('game-progress').style.width = ((gameSession.roundNum - 1) / gameSession.total * 100) + '%';
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-feedback').className = 'answer-feedback';
  renderHistory();

  try {
    const round = await api('GET', `/game/round?mode=${gameSession.mode}`);
    gameSession.round = round;
    gameSession.startTime = Date.now();

    const badge   = document.getElementById('game-mode-badge');
    const imgWrap = document.getElementById('game-image-wrap');
    const question = document.getElementById('game-question');
    badge.textContent = round.mode.charAt(0).toUpperCase() + round.mode.slice(1);

    if (round.mode === 'screenshot' || round.mode === 'portrait') {
      const img = document.getElementById('game-image');
      img.src = round.question_data?.image_url ?? '';
      img.className = round.mode === 'screenshot' ? 'game-image blurred' : 'game-image';
      imgWrap.style.display = 'block';
      question.textContent = round.mode === 'screenshot'
        ? 'Quel animé est représenté sur cette image floutée ?'
        : 'Quel animé appartient à ce personnage ?';
    } else {
      imgWrap.style.display = 'none';
      question.textContent = round.question_data?.hint ?? 'Description indisponible...';
    }

    startTimer();
  } catch (e) { showFeedback('Erreur chargement: ' + e.message, false); }
}

function startTimer() {
  const fill = document.getElementById('timer-fill');
  const duration = 15000;
  const start = Date.now();
  if (gameSession.timer) clearInterval(gameSession.timer);
  gameSession.timer = setInterval(() => {
    const elapsed = Date.now() - start;
    const pct = Math.max(0, 100 - (elapsed / duration * 100));
    fill.style.width = pct + '%';
    fill.style.background = pct < 30 ? 'var(--accent)' : pct < 60 ? 'var(--gold)' : 'var(--teal)';
    if (pct <= 0) { clearInterval(gameSession.timer); submitAnswer(true); }
  }, 100);
}

async function submitAnswer(timeout = false) {
  if (!gameSession.round) return;
  if (gameSession.timer) clearInterval(gameSession.timer);
  const answer = timeout ? '' : document.getElementById('answer-input').value.trim();
  const timeTaken = Date.now() - (gameSession.startTime || Date.now());

  try {
    const r = await api('POST', '/game/session/answer', {
      session_id: gameSession.id,
      round_id:   gameSession.round.round_id,
      answer:     answer || '—',
      time_taken_ms: timeTaken,
    });

    // Normalize points to 0-100 range
    const pts = Math.round((r.points_earned / 1000) * MAX_SCORE_PER_ROUND);
    gameSession.score += pts;
    gameSession.history.push({
      correct: r.is_correct,
      points: pts,
      answer: answer || '—',
      correctAnswer: r.correct_answer,
      skipped: timeout && !answer,
    });

    updateScoreDisplay();
    renderHistory();

    showFeedback(
      r.is_correct
        ? `✓ Bonne réponse ! +${pts} pts`
        : (timeout ? `⏱ Temps écoulé — C'était : ${r.correct_answer}` : `✗ C'était : ${r.correct_answer}`),
      r.is_correct
    );

    setTimeout(() => loadNextRound(), 1800);
  } catch (e) { showFeedback('Erreur: ' + e.message, false); }
}

function updateScoreDisplay() {
  const score = gameSession.score;
  const max = gameSession.total * MAX_SCORE_PER_ROUND;
  const pct = Math.round(score / max * 100);
  const color = scoreColor(score, max);
  const rank  = scoreRank(score, max);

  document.getElementById('score-current').textContent = score;
  document.getElementById('score-current').style.color = color;
  document.getElementById('score-bar').style.width = pct + '%';
  document.getElementById('score-bar').style.background = color;
  const rankEl = document.getElementById('score-rank');
  rankEl.textContent = rank;
  rankEl.className = 'score-rank-display rank-' + rank.toLowerCase();
}

function renderHistory() {
  const wrap = document.getElementById('round-history');
  const dots = [];
  for (let i = 0; i < gameSession.total; i++) {
    const h = gameSession.history[i];
    if (!h) {
      const isCurrent = i === gameSession.roundNum - 1;
      dots.push(`<div class="round-dot ${isCurrent ? 'current' : 'pending'}">${i + 1}</div>`);
    } else if (h.skipped) {
      dots.push(`<div class="round-dot skipped" title="Passé">${i + 1}</div>`);
    } else if (h.correct) {
      dots.push(`<div class="round-dot correct" title="+${h.points}pts">✓</div>`);
    } else {
      dots.push(`<div class="round-dot wrong" title="${esc(h.correctAnswer)}">✗</div>`);
    }
  }
  wrap.innerHTML = dots.join('');
}

function showFeedback(msg, correct) {
  const el = document.getElementById('answer-feedback');
  el.textContent = msg;
  el.className = 'answer-feedback ' + (correct ? 'correct' : 'wrong');
}

function skipRound() { submitAnswer(true); }

async function endGame() {
  if (gameSession.timer) clearInterval(gameSession.timer);
  if (gameSession.id) {
    await api('POST', '/game/session/end', { session_id: gameSession.id }).catch(() => {});
  }
  window.location.href = 'home.html';
}

function showEndScreen() {
  if (gameSession.timer) clearInterval(gameSession.timer);
  if (gameSession.id) {
    api('POST', '/game/session/end', { session_id: gameSession.id }).catch(() => {});
  }

  const score = gameSession.score;
  const max   = gameSession.total * MAX_SCORE_PER_ROUND;
  const correct = gameSession.history.filter(h => h.correct).length;
  const color = scoreColor(score, max);
  const rank  = scoreRank(score, max);

  document.getElementById('game-area').style.display = 'none';
  document.getElementById('end-screen').style.display = 'block';

  document.getElementById('end-score').textContent = score;
  document.getElementById('end-score').style.color = color;
  document.getElementById('end-rank').textContent = rank;
  document.getElementById('end-rank').style.color = color;
  document.getElementById('end-summary').textContent = `${correct} bonnes réponses sur ${gameSession.total} — ${Math.round(correct / gameSession.total * 100)}% de précision`;

  // Per-round items
  document.getElementById('end-history').innerHTML = gameSession.history.map((h, i) => `
    <div class="end-item" style="border-color:${h.correct ? 'var(--teal)' : h.skipped ? 'var(--text3)' : 'var(--accent)'}">
      <div class="end-item-label">Round ${i + 1}</div>
      <div class="end-item-pts" style="color:${h.correct ? 'var(--teal)' : 'var(--text3)'}">
        ${h.correct ? '+' + h.points + ' pts' : h.skipped ? 'Passé' : '0 pts'}
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(h.correctAnswer)}</div>
    </div>`).join('');
}

async function replayGame() {
  await startGame(gameSession.mode);
}
</script>
</body>
</html>
