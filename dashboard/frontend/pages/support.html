<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Support', 'support');

  const pc = document.getElementById('page-content');
  pc.innerHTML = `<div style="max-width:800px">
    <div class="card mb-16">
      <div class="card-header"><span class="card-title">🛟 FAQ</span></div>
      ${[
        ['Comment signaler un bug ?', 'Via la page <a href="/pages/contact.html">Contact</a> en sélectionnant "Bug".'],
        ['Je ne peux plus me connecter', 'Essaie la récupération de mot de passe. Si problème persistant, contacte-nous avec ton email.'],
        ['Supprimer mon compte / mes données ?', 'Demande par email (voir <a href="/pages/legal.html">mentions légales</a>). Suppression sous 30 jours.'],
        ['L\'appli mobile ne démarre pas', 'Vérifie Android 8+ ou iOS 14+. Réinstalle depuis la page <a href="/pages/versions.html">Versions</a>.'],
        ['Télécharger la version desktop ?', 'Page <a href="/pages/versions.html">Versions</a> du dashboard.'],
      ].map(([q,a])=>`
        <details style="border-bottom:1px solid var(--border);padding:14px 0">
          <summary style="cursor:pointer;font-weight:600">${q}</summary>
          <p class="text-muted mt-8" style="padding-left:16px">${a}</p>
        </details>`).join('')}
    </div>
    <div class="card mb-16">
      <div class="card-header"><span class="card-title">📋 Statut des services</span></div>
      <div id="status-list"><div class="spinner"></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">📚 Ressources</span></div>
      <a href="/pages/legal.html" class="btn btn-ghost mb-16">📋 Mentions légales</a>
      <a href="/pages/contact.html" class="btn btn-ghost">✉️ Contact</a>
    </div>
  </div>`;

  api.containerSummary().then(s => {
    const ok = s.stopped === 0;
    document.getElementById('status-list').innerHTML = `
      <div class="alert ${ok?'alert-ok':'alert-warn'}">${ok?'✅ Tous les services sont opérationnels':'⚠️ '+s.stopped+' service(s) arrêté(s)'}</div>
      <div class="flex gap-8 flex-wrap mt-8">
        <span class="badge ${s.frontends>0?'badge-ok':'badge-err'}">Frontend (${s.frontends})</span>
        <span class="badge ${s.backends>0?'badge-ok':'badge-err'}">Backend (${s.backends})</span>
      </div>`;
  }).catch(() => {
    document.getElementById('status-list').innerHTML = '<p class="text-muted">Statut non disponible.</p>';
  });
</script>
</body>
</html>
