<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cron — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .cron-entry { font-family:monospace; background:var(--bg3); border-radius:6px; padding:8px 12px; margin-bottom:6px; font-size:12px; color:var(--accent2); }
  </style>
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Planificateur Cron', 'cron');

  async function loadCron() {
    const pc = document.getElementById('page-content');
    pc.innerHTML = '<div class="loading-state"><div class="spinner"></div><p class="mt-8">Lecture des crontabs…</p></div>';
    try {
      const data = await api.cronAll();
      let html = `<div class="flex items-center gap-8 mb-16" style="justify-content:space-between">
        <span class="text-muted">${data.withCron.length} conteneur(s) avec cron</span>
        <button class="btn btn-ghost btn-sm" onclick="loadCron()">↻ Rafraîchir</button>
      </div>`;

      if (!data.withCron.length) html += '<div class="alert alert-warn">Aucun conteneur avec crontab active.</div>';

      data.withCron.forEach(c => {
        html += `<div class="card mb-16">
          <div class="card-header">
            <h3 style="font-weight:600">
              <a href="/pages/container-detail.html?id=${c.id}" style="color:var(--accent2)">${c.name}</a>
              <span class="badge badge-info" style="margin-left:8px">${c.service}</span>
            </h3>
          </div>
          <div class="cards-grid-2">
            <div>
              <p class="text-muted mb-16" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Entrées</p>
              ${c.entries.map(e=>`<div class="cron-entry">${escHtml(e)}</div>`).join('')}
            </div>
            <div>
              <p class="text-muted mb-16" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Logs récents</p>
              <div class="log-box" style="max-height:200px">${escHtml(c.logs||'[pas de log]')}</div>
            </div>
          </div>
        </div>`;
      });

      if (data.withoutCron.length) {
        html += `<div class="card"><div class="card-header"><span class="card-title">Sans cron</span></div>
          <div class="flex gap-8 flex-wrap">${data.withoutCron.map(n=>`<span class="badge badge-info">${n}</span>`).join('')}</div>
        </div>`;
      }
      pc.innerHTML = html;
    } catch(e) {
      pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  loadCron();
</script>
</body>
</html>
