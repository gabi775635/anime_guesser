<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentions légales — AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .legal-wrap { max-width:760px; }

    p, li { line-height:1.8; color:var(--text-muted); }

</head>

<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script src="/api/config.js"></script>
<script>
  injectLayout('Mentions légales', 'legal');

  const pc = document.getElementById('page-content');
  pc.innerHTML = `<div class="legal-wrap card">

    <h2>1. Éditeur</h2>
    <p><strong>${window.LEGAL_NAME||'[À renseigner dans .env — LEGAL_NAME]'}</strong><br>
    ${window.LEGAL_ADDRESS||'[À renseigner dans .env — LEGAL_ADDRESS]'}<br>
    ${window.LEGAL_SIRET?'SIRET : '+window.LEGAL_SIRET+'<br>':''}
    Email : <a href="mailto:${window.CONTACT_EMAIL||'contact@animeguesser.fr'}">${window.CONTACT_EMAIL||'contact@animeguesser.fr'}</a></p>

    <h2>2. Hébergement</h2>

    <h2>4. Données personnelles (RGPD)</h2>
    <p>AnimeGuesser collecte : pseudonyme, email, scores. Ces données ne sont pas revendues.<br>
    Droits : accès, rectification, effacement, portabilité, opposition.<br>
    Contact : <a href="mailto:${window.CONTACT_EMAIL||'privacy@animeguesser.fr'}">${window.CONTACT_EMAIL||'privacy@animeguesser.fr'}</a><br>
    Conservation : durée d'activité du compte + 30 jours après suppression.</p>

    <h2>5. Cookies</h2>
    <p>Uniquement des cookies de session (token d'authentification). Aucun cookie de tracking.</p>

    <h2>6. Droit applicable</h2>
    <p>Droit français. Tribunaux compétents de France.</p>

    <hr class="sep">
    <p style="font-size:12px"><a href="/pages/contact.html">Contact</a> • <a href="/pages/support.html">Support</a></p>
  </div>`;
</script>
</body>
</html>
