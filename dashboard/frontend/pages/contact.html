<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script src="/api/config.js"></script>
<script>
  injectLayout('Contact', 'contact');

  const pc = document.getElementById('page-content');
  pc.innerHTML = `<div style="max-width:600px">
    <div class="card mb-16">
      <div class="card-header"><span class="card-title">✉️ Nous contacter</span></div>
      <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="vous@exemple.com"></div>
      <div class="form-group"><label>Sujet</label>
        <select id="c-subject">
          <option value="bug">🐛 Bug</option>
          <option value="suggestion">💡 Suggestion</option>
          <option value="account">👤 Compte</option>
          <option value="legal">⚖️ RGPD / Légal</option>
          <option value="other">❓ Autre</option>
        </select>
      </div>
      <div class="form-group"><label>Message</label><textarea id="c-msg" rows="5" placeholder="Votre message…"></textarea></div>
      <div id="c-alert"></div>
      <button class="btn btn-primary" onclick="sendContact()">Envoyer</button>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">📬 Autres canaux</span></div>
      ${window.DISCORD_INVITE?`<a href="${window.DISCORD_INVITE}" target="_blank" class="btn btn-ghost mb-16">Discord — Support communautaire</a>`:''}
      ${window.CONTACT_EMAIL?`<a href="mailto:${window.CONTACT_EMAIL}" class="btn btn-ghost mb-16">📧 ${window.CONTACT_EMAIL}</a>`:''}
      ${window.TWITTER_HANDLE?`<a href="https://twitter.com/${window.TWITTER_HANDLE}" target="_blank" class="btn btn-ghost">𝕏 @${window.TWITTER_HANDLE}</a>`:''}
    </div>
  </div>`;

  function sendContact() {
    const email = document.getElementById('c-email').value;
    const msg   = document.getElementById('c-msg').value;
    const az    = document.getElementById('c-alert');
    if (!email || !msg) { az.innerHTML='<div class="alert alert-err">Remplis tous les champs.</div>'; return; }
    az.innerHTML = '<div class="alert alert-ok">✅ Message envoyé ! Réponse sous 48h.</div>';
  }
</script>
</body>
</html>
