<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conteneurs â€” Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Conteneurs Docker', 'containers');

  document.getElementById('page-content').innerHTML = `
    <div class="flex items-center gap-8 mb-16" style="justify-content:space-between">
      <div class="flex gap-8">
        <button class="btn btn-primary" onclick="spawnContainer('frontend')">+ Frontend</button>
        <button class="btn btn-ghost"   onclick="spawnContainer('backend')">+ Backend</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadContainers()">â†» RafraĂ®chir</button>
    </div>
    <div id="alert-zone"></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nom</th><th>Service</th><th>Ă‰tat</th><th>CPU</th><th>RAM</th><th>Actions</th></tr></thead>
          <tbody id="containers-table"><tr><td colspan="6" class="loading-state"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>`;

  const BASE = ['animeguesser-frontend-1','animeguesser-frontend-2','animeguesser-backend',
                 'animeguesser-lb','animeguesser-db','animeguesser-dashboard','animeguesser-version-server'];

  async function loadContainers() {
    try {
      const list = await api.containers();
      document.getElementById('containers-table').innerHTML = list.map(c => {
        const cpuColor = c.cpu > 80 ? 'text-err' : c.cpu > 40 ? 'text-warn' : '';
        const isBase   = BASE.includes(c.name);
        return `<tr>
          <td><a href="/pages/container-detail.html?id=${c.id}" style="color:var(--accent2);font-weight:500">${c.name}</a></td>
          <td><span class="badge badge-info">${c.service}</span></td>
          <td>${statusBadge(c.status)}</td>
          <td class="${cpuColor}">${c.status==='running' ? c.cpu+'%' : 'â€”'}</td>
          <td>${c.status==='running' ? fmtBytes(c.memMB) : 'â€”'}</td>
          <td><div class="btn-group">
            ${c.status==='running'
              ? `<button class="btn btn-ghost btn-sm" onclick="action('${c.id}','stop')">âŹą</button>
                 <button class="btn btn-ghost btn-sm" onclick="action('${c.id}','restart')">â†ş</button>`
              : `<button class="btn btn-ok btn-sm" onclick="action('${c.id}','start')">â–¶</button>`}
            ${!isBase ? `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${c.id}','${c.name}')">đź—‘</button>` : ''}
          </div></td>
        </tr>`;
      }).join('');
    } catch (e) { showAlert('err', e.message); }
  }

  async function action(id, type) {
    try {
      if (type === 'start')   await api.containerStart(id);
      if (type === 'stop')    await api.containerStop(id);
      if (type === 'restart') await api.containerRestart(id);
      setTimeout(loadContainers, 1200);
    } catch (e) { showAlert('err', e.message); }
  }

  async function spawnContainer(service) {
    try {
      const r = await api.containerSpawn(service);
      showAlert('ok', `âś… ${r.name} crĂ©Ă©`);
      setTimeout(loadContainers, 1500);
    } catch (e) { showAlert('err', e.message); }
  }

  function confirmDelete(id, name) {
    if (!confirm(`Supprimer "${name}" ?`)) return;
    api.containerDelete(id)
      .then(() => { showAlert('ok', `âś… ${name} supprimĂ©`); loadContainers(); })
      .catch(e => showAlert('err', e.message));
  }

  function showAlert(type, msg) {
    const z = document.getElementById('alert-zone');
    z.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => { z.innerHTML = ''; }, 4000);
  }

  loadContainers();
  connectWs(msg => {
    if (['container_added','container_removed','container_started','container_stopped','container_restarted'].includes(msg.type))
      loadContainers();
  });
</script>
</body>
</html>
