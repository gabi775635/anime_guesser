<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Performance Serveur', 'perf');

  async function loadPerf() {
    const pc = document.getElementById('page-content');
    if (!pc) return;
    try {
      const d = await api.serverPerf();
      const cc = c => c > 80 ? 'err' : c > 40 ? 'warn' : 'ok';
      pc.innerHTML = `
        <div class="cards-grid mb-16">
          <div class="card stat-card"><div class="stat-value text-${cc(d.totalCpu)==='ok'?'ok':cc(d.totalCpu)==='warn'?'warn':'err'}">${d.totalCpu}%</div><div class="stat-label">CPU total</div></div>
          <div class="card stat-card"><div class="stat-value text-accent">${fmtBytes(d.totalMemMB)}</div><div class="stat-label">RAM utilisée</div></div>
          <div class="card stat-card"><div class="stat-value">${d.containers.length}</div><div class="stat-label">Conteneurs actifs</div></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Détail</span><span class="text-muted" style="font-size:11px">Auto-refresh 5s</span></div>
          <table><thead><tr><th>Conteneur</th><th>Service</th><th>CPU</th><th>RAM</th></tr></thead>
          <tbody>${d.containers.sort((a,b)=>b.cpu-a.cpu).map(c=>`
            <tr class="clickable" onclick="location.href='/pages/container-detail.html?id=${c.name}'">
              <td><a href="/pages/container-detail.html?id=${c.name}" style="color:var(--accent2)">${c.name}</a></td>
              <td><span class="badge badge-info">${c.service}</span></td>
              <td>
                <div class="flex items-center gap-8">
                  <div class="progress" style="width:80px"><div class="progress-bar ${cc(c.cpu)}" style="width:${Math.min(c.cpu,100)}%"></div></div>
                  <span class="text-${cc(c.cpu)==='ok'?'ok':cc(c.cpu)==='warn'?'warn':'err'}">${c.cpu}%</span>
                </div>
              </td>
              <td>${fmtBytes(c.memMB)} <span class="text-muted">(${c.memPct}%)</span></td>
            </tr>`).join('')}</tbody></table>
        </div>`;
    } catch(e) {
      if (pc) pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  loadPerf();
  setInterval(loadPerf, 5000);
</script>
</body>
</html>
