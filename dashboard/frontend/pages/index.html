<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Vue d\'ensemble', 'home');

  async function loadPage() {
    const pc = document.getElementById('page-content');
    pc.innerHTML = '<div class="loading-state"><div class="spinner"></div><p class="mt-8">Chargement…</p></div>';
    try {
      const [summary, perf, latest] = await Promise.all([
        api.containerSummary(),
        api.serverPerf(),
        api.versionsLatest().catch(() => ({ latest: null })),
      ]);

      pc.innerHTML = `
        <div class="cards-grid mb-16">
          <div class="card stat-card"><div class="stat-value text-ok">${summary.running}</div><div class="stat-label">Conteneurs actifs</div></div>
          <div class="card stat-card"><div class="stat-value ${summary.stopped > 0 ? 'text-err' : 'text-ok'}">${summary.stopped}</div><div class="stat-label">Arrêtés</div></div>
          <div class="card stat-card"><div class="stat-value">${summary.frontends}</div><div class="stat-label">Frontends</div></div>
          <div class="card stat-card"><div class="stat-value">${summary.backends}</div><div class="stat-label">Backends</div></div>
          <div class="card stat-card"><div class="stat-value text-warn">${perf.totalCpu}%</div><div class="stat-label">CPU total</div></div>
          <div class="card stat-card"><div class="stat-value text-accent">${fmtBytes(perf.totalMemMB)}</div><div class="stat-label">RAM utilisée</div></div>
        </div>
        <div class="cards-grid-2 mb-16">
          <div class="card">
            <div class="card-header"><span class="card-title">🔥 CPU par conteneur</span></div>
            <table><thead><tr><th>Conteneur</th><th>CPU</th><th>RAM</th></tr></thead>
            <tbody>${perf.containers.sort((a,b)=>b.cpu-a.cpu).map(c => {
              const col = c.cpu > 80 ? 'text-err' : c.cpu > 40 ? 'text-warn' : 'text-ok';
              return `<tr><td>${c.name} <small class="text-muted">(${c.service})</small></td><td class="${col}">${c.cpu}%</td><td>${fmtBytes(c.memMB)}</td></tr>`;
            }).join('')}</tbody></table>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">🚀 Dernière version</span></div>
            <div id="version-info"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📦 Conteneurs</span>
            <a href="/pages/containers.html" class="btn btn-ghost btn-sm">Tout voir →</a>
          </div>
          <div id="containers-mini"></div>
        </div>`;

      // Version
      const vi = document.getElementById('version-info');
      if (latest && latest.latest) {
        const v = latest.latest;
        vi.innerHTML = `
          <div class="flex items-center gap-12 mb-16">
            <span class="stat-value text-accent">${v.version}</span>
            <div><div class="text-muted" style="font-size:12px">Buildée le</div><div>${fmtDate(v.builtAt)}</div></div>
          </div>
          <div class="flex gap-8 flex-wrap">
            ${(v.files||[]).map(f=>`<a href="${api.downloadUrl(f.filename)}" class="btn btn-ghost btn-sm" download>⬇️ ${f.platform}</a>`).join('')}
          </div>`;
      } else {
        vi.innerHTML = '<p class="text-muted">Aucune release disponible.</p>';
      }

      // Mini liste conteneurs
      const containers = await api.containers();
      document.getElementById('containers-mini').innerHTML = `
        <table><thead><tr><th>Nom</th><th>Service</th><th>État</th><th>CPU</th><th>RAM</th></tr></thead>
        <tbody>${containers.slice(0,8).map(c=>`
          <tr class="clickable" onclick="location.href='/pages/container-detail.html?id=${c.id}'">
            <td>${c.name}</td>
            <td><span class="badge badge-info">${c.service}</span></td>
            <td>${statusBadge(c.status)}</td>
            <td>${c.cpu}%</td>
            <td>${fmtBytes(c.memMB)}</td>
          </tr>`).join('')}</tbody></table>`;

    } catch (e) {
      pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  loadPage();
  setInterval(loadPage, 30000);

  connectWs(msg => {
    if (msg.type === 'stats_update') { /* mise à jour silencieuse */ }
  });
</script>
</body>
</html>
