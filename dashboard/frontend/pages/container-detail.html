<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail conteneur — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .info-item { background:var(--bg3); border-radius:8px; padding:12px; }
    .info-item .label { font-size:11px; color:var(--text-muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .info-item .value { font-size:14px; font-weight:500; word-break:break-all; }
    .cron-entry { font-family:monospace; background:var(--bg3); border-radius:6px; padding:8px 12px; margin-bottom:6px; font-size:12px; color:var(--accent2); }
    .kv-row { display:flex; gap:12px; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .kv-row:last-child { border:none; }
    .kv-key { color:var(--text-muted); min-width:140px; flex-shrink:0; }
  </style>
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  const CONTAINER_ID = new URLSearchParams(location.search).get('id');
  if (!CONTAINER_ID) location.href = '/pages/containers.html';

  injectLayout('Détail conteneur', 'containers');
  loadDetail();

  async function loadDetail() {
    const pc = document.getElementById('page-content');
    pc.innerHTML = '<div class="loading-state"><div class="spinner"></div><p class="mt-8">Chargement…</p></div>';
    try {
      const d = await api.containerDetail(CONTAINER_ID);
      const cpuColor = d.cpu > 80 ? 'text-err' : d.cpu > 40 ? 'text-warn' : 'text-ok';

      pc.innerHTML = `
        <div class="flex items-center gap-12 mb-16" style="justify-content:space-between;flex-wrap:wrap">
          <div class="flex items-center gap-12">
            <a href="/pages/containers.html" class="btn btn-ghost btn-sm">← Retour</a>
            <h2 style="font-size:18px;font-weight:700">${d.name}</h2>
            ${statusBadge(d.status)}
            <span class="badge badge-info">${d.service}</span>
          </div>
          <div class="btn-group">
            ${d.running
              ? `<button class="btn btn-ghost" onclick="doAction('stop')">⏹ Arrêter</button>
                 <button class="btn btn-ghost" onclick="doAction('restart')">↺ Redémarrer</button>`
              : `<button class="btn btn-ok" onclick="doAction('start')">▶ Démarrer</button>`}
          </div>
        </div>
        <div id="action-alert"></div>

        <div class="info-grid mb-16">
          <div class="info-item"><div class="label">CPU</div><div class="value ${cpuColor}">${d.cpu}%</div></div>
          <div class="info-item"><div class="label">RAM</div><div class="value">${fmtBytes(d.mem.used)} <span class="text-muted">(${d.mem.pct}%)</span></div></div>
          <div class="info-item"><div class="label">Image</div><div class="value text-muted" style="font-size:11px">${d.image}</div></div>
          <div class="info-item"><div class="label">Démarré le</div><div class="value" style="font-size:12px">${fmtDate(d.startedAt)}</div></div>
          <div class="info-item"><div class="label">ID</div><div class="value text-muted" style="font-size:12px">${CONTAINER_ID}</div></div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('logs',this)">📄 Logs</button>
          <button class="tab-btn" onclick="switchTab('cron',this)">⏰ Cron</button>
          <button class="tab-btn" onclick="switchTab('extra',this)">ℹ️ Infos</button>
          <button class="tab-btn" onclick="switchTab('env',this)">🔧 Env</button>
        </div>

        <div id="tab-logs" class="tab-pane active">
          <div class="flex items-center gap-8 mb-16" style="justify-content:space-between">
            <span class="text-muted" style="font-size:12px">100 dernières lignes</span>
            <button class="btn btn-ghost btn-sm" onclick="refreshLogs()">↻</button>
          </div>
          <div class="log-box" id="log-content">${escHtml(d.logs)}</div>
        </div>

        <div id="tab-cron" class="tab-pane">
          <div class="card mb-16">
            <div class="card-header"><span class="card-title">Entrées crontab</span></div>
            ${d.cron.entries.length > 0
              ? d.cron.entries.map(e=>`<div class="cron-entry">${escHtml(e)}</div>`).join('')
              : '<p class="text-muted">Aucune entrée cron.</p>'}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Logs cron</span></div>
            <div class="log-box">${escHtml(d.cron.logs||'[aucun log]')}</div>
          </div>
        </div>

        <div id="tab-extra" class="tab-pane">
          <div class="card">${renderExtra(d.extra, d.service)}</div>
        </div>

        <div id="tab-env" class="tab-pane">
          <div class="card">
            <div class="card-header"><span class="card-title">Variables d'environnement</span><span class="text-muted" style="font-size:12px">Secrets masqués</span></div>
            ${(d.env||[]).map(e => {
              const [k,...rest] = e.split('=');
              return `<div class="kv-row"><span class="kv-key">${escHtml(k)}</span><span>${escHtml(rest.join('='))}</span></div>`;
            }).join('')}
          </div>
        </div>`;

      document.getElementById('log-content').scrollTop = 99999;
    } catch(e) {
      pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  function renderExtra(extra, service) {
    if (!extra || !extra.type) return '<p class="text-muted">Pas d\'infos supplémentaires.</p>';
    if (extra.type === 'web') {
      const sc = extra.statusCodes || {};
      return `<div class="card-header"><span class="card-title">Activité web</span></div>
        <div class="info-grid">
          <div class="info-item"><div class="label">Requêtes</div><div class="value">${extra.totalRequests}</div></div>
          <div class="info-item"><div class="label">2xx</div><div class="value text-ok">${sc['2xx']||0}</div></div>
          <div class="info-item"><div class="label">4xx</div><div class="value text-err">${sc['4xx']||0}</div></div>
          <div class="info-item"><div class="label">5xx</div><div class="value text-err">${sc['5xx']||0}</div></div>
        </div>`;
    }
    if (extra.type === 'backend') return `
      <div class="card-header"><span class="card-title">Backend</span></div>
      <div class="kv-row"><span class="kv-key">PHP</span><span>${extra.phpVersion}</span></div>
      <div class="kv-row"><span class="kv-key">Laravel</span><span>${extra.laravelVersion}</span></div>`;
    if (extra.type === 'version-server') return `
      <div class="card-header"><span class="card-title">Releases</span></div>
      <div class="log-box">${escHtml(extra.releases)}</div>
      <div class="mt-8"><a href="/pages/versions.html" class="btn btn-ghost btn-sm">Gérer →</a></div>`;
    if (extra.type === 'backup') return `
      <div class="card-header"><span class="card-title">Backup</span></div>
      <div class="log-box">${escHtml(extra.lastRun)}</div>`;
    return `<pre style="font-size:12px;color:var(--text-muted)">${JSON.stringify(extra,null,2)}</pre>`;
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  async function doAction(type) {
    const az = document.getElementById('action-alert');
    try {
      if (type === 'start')   await api.containerStart(CONTAINER_ID);
      if (type === 'stop')    await api.containerStop(CONTAINER_ID);
      if (type === 'restart') await api.containerRestart(CONTAINER_ID);
      az.innerHTML = `<div class="alert alert-ok">✅ Action "${type}" effectuée</div>`;
      setTimeout(() => { az.innerHTML=''; loadDetail(); }, 1500);
    } catch(e) {
      az.innerHTML = `<div class="alert alert-err">❌ ${e.message}</div>`;
    }
  }

  async function refreshLogs() {
    const box = document.getElementById('log-content');
    if (!box) return;
    try {
      box.textContent = await api.containerLogs(CONTAINER_ID, 200);
      box.scrollTop = 99999;
    } catch(e) { box.textContent = 'Erreur : ' + e.message; }
  }
</script>
</body>
</html>
