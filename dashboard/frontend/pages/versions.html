<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versions — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .version-card { border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px; background:var(--bg2); }
    .version-card.latest { border-color:var(--accent); }
    .version-num { font-size:22px; font-weight:700; color:var(--accent2); }

    .build-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }
    .build-panel-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .build-status {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .build-status.running  { display:block; background: rgba(59,130,246,.15); color: var(--info); border: 1px solid rgba(59,130,246,.3); }
    .build-status.success  { display:block; background: rgba(34,197,94,.12); color: var(--ok); border: 1px solid rgba(34,197,94,.3); }
    .build-status.error    { display:block; background: rgba(239,68,68,.12); color: var(--err); border: 1px solid rgba(239,68,68,.3); }
    .build-log-box {
      margin-top: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .spinner-inline {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Versions & Releases', 'versions');

  // ── Lancement manuel du build ──────────────────────────────────────────────
  async function triggerBuild() {
    const btn    = document.getElementById('build-btn');
    const status = document.getElementById('build-status');
    const logBox = document.getElementById('build-log-box');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span> Build en cours…';
    status.className = 'build-status running';
    status.innerHTML = '<span class="spinner-inline"></span> Compilation lancée — cela peut prendre 15-30 min selon la plateforme…';
    logBox.style.display = 'none';

    try {
      const token = localStorage.getItem('dashboard_token');
      const res   = await fetch('/api/versions/build', {
        method: 'POST',
        headers: { 'x-dashboard-token': token }
      });
      const data = await res.json();

      if (data.success) {
        status.className = 'build-status success';
        status.textContent = '✅ Build terminé avec succès.';
        if (data.output) {
          logBox.style.display = 'block';
          logBox.textContent = data.output;
          logBox.scrollTop = logBox.scrollHeight;
        }
        setTimeout(() => loadVersions(), 1500);
      } else {
        status.className = 'build-status error';
        status.textContent = '❌ Erreur : ' + (data.error || 'inconnue');
        if (data.output) {
          logBox.style.display = 'block';
          logBox.textContent = data.output;
        }
      }
    } catch (e) {
      status.className = 'build-status error';
      status.textContent = '❌ Requête échouée : ' + e.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '▶ Lancer un build';
    }
  }

  // ── Chargement des versions ────────────────────────────────────────────────
  async function loadVersions() {
    const pc = document.getElementById('page-content');
    pc.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    try {
      const [dbData, logsText] = await Promise.all([
        api.versions(),
        fetch('/api/versions/logs', { headers: { 'x-dashboard-token': localStorage.getItem('dashboard_token') } }).then(r => r.text()).catch(() => '[logs non disponibles]'),
      ]);

      const { versions } = dbData;
      const icons = { android:'🤖', ios:'🍎', windows:'🪟', linux:'🐧', macos:'🍎', desktop:'🖥️', unknown:'📦' };

      let html = `
        <!-- ── Panneau de build manuel ── -->
        <div class="build-panel">
          <div class="build-panel-title">🔨 Build manuel</div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <button id="build-btn" class="btn btn-primary" onclick="triggerBuild()">▶ Lancer un build</button>
            <span class="text-muted" style="font-size:12px">Génère Android APK · Linux AppImage/deb · Windows exe/msi</span>
          </div>
          <div id="build-status" class="build-status"></div>
          <div id="build-log-box" class="build-log-box"></div>
        </div>

        <div class="flex items-center gap-8 mb-16" style="justify-content:space-between">
          <span class="text-muted">${versions.length} version(s) disponible(s)</span>
          <button class="btn btn-ghost btn-sm" onclick="loadVersions()">↻ Rafraîchir</button>
        </div>`;

      if (!versions.length) {
        html += `<div class="alert alert-warn mb-16">
          Aucune release trouvée dans <code>/releases</code>.<br>
          Cliquez sur <strong>Lancer un build</strong> ci-dessus ou attendez le cron de 03h30.
        </div>`;
      } else {
        const sorted = [...versions].sort((a,b) => {
          const pa=a.version.split('.').map(Number), pb=b.version.split('.').map(Number);
          for(let i=0;i<3;i++) if((pa[i]??0)!==(pb[i]??0)) return (pb[i]??0)-(pa[i]??0);
          return 0;
        });
        sorted.forEach((v,i) => {
          html += `<div class="version-card ${i===0?'latest':''}">
            <div class="flex items-center gap-12 mb-12" style="justify-content:space-between;flex-wrap:wrap">
              <div class="flex items-center gap-12">
                <span class="version-num">v${v.version}</span>
                ${i===0?'<span class="badge badge-ok">Dernière</span>':''}
                <span class="badge badge-info">${v.channel||'stable'}</span>
              </div>
              <span class="text-muted" style="font-size:12px">🕐 ${fmtDate(v.builtAt)}</span>
            </div>
            ${v.notes ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${escHtml(v.notes)}</p>` : ''}
            <div class="flex gap-8 flex-wrap">
              ${(v.files||[]).map(f => `
                <a href="/api/versions/download/${encodeURIComponent(f.filename)}"
                   download class="btn btn-ghost">
                  ${icons[f.platform?.toLowerCase()]||'📦'} ${f.platform}${f.arch?' '+f.arch:''}
                  ${f.sizeMb ? `<span class="text-muted" style="font-size:11px">${f.sizeMb} Mo</span>` : ''}
                  ⬇
                </a>`).join('')}
            </div>
            ${v.commitHash ? `<p class="text-muted mt-8" style="font-size:11px">Commit : <code>${v.commitHash.slice(0,12)}</code></p>` : ''}
          </div>`;
        });
      }

      // Logs de build
      html += `<div class="card mt-16">
        <div class="card-header">
          <span class="card-title">📋 Logs du version-server</span>
          <span class="text-muted" style="font-size:11px">100 dernières lignes</span>
        </div>
        <div class="log-box" style="max-height:300px">${escHtml(logsText)}</div>
      </div>`;

      pc.innerHTML = html;
    } catch(e) {
      pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  loadVersions();
</script>
</body>
</html>
