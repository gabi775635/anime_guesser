<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versions — Dashboard AnimeGuesser</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .version-card { border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px; background:var(--bg2); }
    .version-card.latest { border-color:var(--accent); }
    .version-num { font-size:22px; font-weight:700; color:var(--accent2); }
  </style>
</head>
<body>
<script src="/shared/api.js"></script>
<script src="/shared/layout.js"></script>
<script>
  injectLayout('Versions & Releases', 'versions');

  async function loadVersions() {
    const pc = document.getElementById('page-content');
    pc.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    try {
      const { versions } = await api.versions();
      if (!versions || !versions.length) {
        pc.innerHTML = `<div class="card"><p class="text-muted" style="text-align:center;padding:40px">
          Aucune release disponible.<br><br>
          Le <strong>version-server</strong> génère les builds automatiquement chaque nuit.
        </p></div>`;
        return;
      }
      const sorted = [...versions].sort((a,b)=>{
        const pa=a.version.split('.').map(Number), pb=b.version.split('.').map(Number);
        for(let i=0;i<3;i++) if((pa[i]??0)!==(pb[i]??0)) return (pb[i]??0)-(pa[i]??0);
        return 0;
      });
      const icons = { android:'🤖', ios:'🍎', windows:'🪟', linux:'🐧', macos:'🍎', desktop:'🖥️' };
      let html = `<div class="flex items-center gap-8 mb-16" style="justify-content:space-between">
        <span class="text-muted">${versions.length} version(s)</span>
        <button class="btn btn-ghost btn-sm" onclick="loadVersions()">↻</button>
      </div>`;
      sorted.forEach((v,i) => {
        html += `<div class="version-card ${i===0?'latest':''}">
          <div class="flex items-center gap-12 mb-16" style="justify-content:space-between;flex-wrap:wrap">
            <div class="flex items-center gap-12">
              <span class="version-num">v${v.version}</span>
              ${i===0?'<span class="badge badge-ok">Dernière</span>':''}
              <span class="badge badge-info">${v.channel||'stable'}</span>
            </div>
            <span class="text-muted" style="font-size:12px">${fmtDate(v.builtAt)}</span>
          </div>
          <div class="flex gap-8 flex-wrap">
            ${(v.files||[]).map(f=>`
              <a href="${api.downloadUrl(f.filename)}" download class="btn btn-ghost">
                ${icons[f.platform?.toLowerCase()]||'📦'} ${f.platform}${f.arch?' '+f.arch:''}${f.sizeMb?' ('+f.sizeMb+' Mo)':''} ⬇
              </a>`).join('')}
          </div>
          ${v.commitHash?`<p class="text-muted mt-8" style="font-size:11px">Commit : <code>${v.commitHash.slice(0,12)}</code></p>`:''}
        </div>`;
      });
      pc.innerHTML = html;
    } catch(e) {
      pc.innerHTML = `<div class="alert alert-err">Erreur : ${e.message}</div>`;
    }
  }

  loadVersions();
</script>
</body>
</html>
