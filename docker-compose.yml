version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
#  AnimeGuesser — Infrastructure complète
#
#  Arborescence :
#  ├── animeguesser/
#  │   ├── frontend/          SolidJS + Tauri (web)
#  │   └── backend/           Laravel API
#  ├── dashboard/
#  │   ├── backend/           Node.js — API dashboard (routes séparées)
#  │   └── frontend/          HTML multi-pages (pas de SPA)
#  ├── version-server/        Génère APK Android + desktop, stocke les releases
#  ├── backup/                Scripts de sauvegarde BDD
#  ├── docker/                Dockerfiles par service
#  ├── nginx-lb/              Config load balancer
#  ├── scripts/               bump-version.sh, etc.
#  └── .env                   Variables d'environnement (copie de .env.example)
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  animeguesser:
    driver: bridge

volumes:
  db_data:
  backup_data:
  releases:          # Partagé entre version-server et dashboard (lecture releases)

services:

  # ── BASE DE DONNÉES ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: animeguesser-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_DATABASE:-anime_guesser}
      MYSQL_USER:          ${DB_USERNAME:-animeguesser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - animeguesser
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - "animeguesser.service=db"

  # ── BACKUP ──────────────────────────────────────────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: ../docker/backup/Dockerfile
    container_name: animeguesser-backup
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_DATABASE: ${DB_DATABASE:-anime_guesser}
      DB_USERNAME: ${DB_USERNAME:-animeguesser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      TZ:          ${TZ:-Europe/Paris}
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - animeguesser
    labels:
      - "animeguesser.service=backup"
      - "animeguesser.managed=true"

  # ── SETUP (one-shot) ─────────────────────────────────────────────────────────
  setup:
    build:
      context: ./animeguesser/backend
      dockerfile: ../../docker/backend/Dockerfile
    container_name: animeguesser-setup
    profiles: ["setup"]
    restart: "no"
    environment:
      APP_ENV:       production
      APP_KEY:       ${APP_KEY}
      APP_DEBUG:     "false"
      APP_URL:       ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-anime_guesser}
      DB_USERNAME:   ${DB_USERNAME:-animeguesser}
      DB_PASSWORD:   ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - animeguesser
    command: >
      sh -c "
        php artisan key:generate --no-interaction --force &&
        php artisan migrate --force --no-interaction &&
        php artisan db:seed --force --no-interaction &&
        echo '✓ Setup terminé'
      "

  # ── BACKEND LARAVEL ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./animeguesser/backend
      dockerfile: ../../docker/backend/Dockerfile
    container_name: animeguesser-backend
    restart: unless-stopped
    environment:
      APP_ENV:       production
      APP_KEY:       ${APP_KEY}
      APP_DEBUG:     "false"
      APP_URL:       ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-anime_guesser}
      DB_USERNAME:   ${DB_USERNAME:-animeguesser}
      DB_PASSWORD:   ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - animeguesser
    deploy:
      resources:
        limits:    { cpus: "0.20", memory: 512M }
        reservations: { cpus: "0.05", memory: 128M }
    labels:
      - "animeguesser.service=backend"
      - "animeguesser.managed=true"

  # ── FRONTEND 1 ───────────────────────────────────────────────────────────────
  frontend-1:
    build:
      context: ./animeguesser/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: animeguesser-frontend-1
    restart: unless-stopped
    networks:
      - animeguesser
    labels:
      - "animeguesser.service=frontend"
      - "animeguesser.managed=true"
      - "animeguesser.replica=1"

  # ── FRONTEND 2 ───────────────────────────────────────────────────────────────
  frontend-2:
    build:
      context: ./animeguesser/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: animeguesser-frontend-2
    restart: unless-stopped
    networks:
      - animeguesser
    labels:
      - "animeguesser.service=frontend"
      - "animeguesser.managed=true"
      - "animeguesser.replica=2"

  # ── LOAD BALANCER ────────────────────────────────────────────────────────────
  nginx-lb:
    build:
      context: ./docker/nginx-lb
    container_name: animeguesser-lb
    restart: unless-stopped
    ports:
      - "${LB_PORT:-8080}:80"
    depends_on:
      - frontend-1
      - frontend-2
      - backend
    networks:
      - animeguesser
    volumes:
      - ./docker/nginx-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "animeguesser.service=loadbalancer"

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
  # Backend  : dashboard/backend/server.js (routes séparées, pas de logique dans server.js)
  # Frontend : dashboard/frontend/pages/  (multi-pages HTML, pas de SPA)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../docker/dashboard/Dockerfile
    container_name: animeguesser-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/nginx-lb:/lb-config
      - backup_data:/backups:ro
      - releases:/releases:ro          # Lecture des releases générées par version-server
    networks:
      - animeguesser
    environment:
      DOCKER_NETWORK:   ${DOCKER_NETWORK:-animeguesser}
      LB_CONFIG_PATH:   /lb-config/nginx.conf
      LB_CONTAINER:     ${LB_CONTAINER:-animeguesser-lb}
      DASHBOARD_USER:   ${DASHBOARD_USER:-admin}
      DASHBOARD_PASS:   ${DASHBOARD_PASS:-changeme}
      BACKUP_DIR:       /backups
      RELEASES_DIR:     /releases
      VERSIONS_DB:      /releases/versions.json
      CORS_ORIGIN:      ${CORS_ORIGIN:-*}
      TZ:               ${TZ:-Europe/Paris}
    labels:
      - "animeguesser.service=dashboard"

  # ── VERSION SERVER ───────────────────────────────────────────────────────────
  # Rôle : conteneur lourd (Rust + Tauri + Node) qui génère les exécutables
  #   - Android APK
  #   - Linux AppImage / .deb
  #   - Windows EXE (cross-compilation, optionnel)
  #   - macOS DMG (nécessite un Mac ou un runner macOS, optionnel)
  #
  # Cron interne : build toutes les nuits à 03h30 si un nouveau commit existe
  # Les releases sont stockées dans le volume `releases` et téléchargeables
  # depuis le dashboard (page Versions).
  version-server:
    build:
      context: ./version-server
      dockerfile: ../docker/version-server/Dockerfile
    container_name: animeguesser-version-server
    restart: unless-stopped
    volumes:
      - ./animeguesser/frontend:/app/frontend   # Sources frontend (lecture)
      - releases:/releases                       # Releases générées (écriture)
    environment:
      TZ: ${TZ:-Europe/Paris}
    networks:
      - animeguesser
    deploy:
      resources:
        limits:    { cpus: "1.0", memory: 2G }  # Build Tauri est gourmand
        reservations: { cpus: "0.05", memory: 128M }
    labels:
      - "animeguesser.service=version-server"
      - "animeguesser.managed=true"

  # ── VERSION WATCHDOG ─────────────────────────────────────────────────────────
  # Léger : bump PATCH dans package.json chaque nuit à 03h00 si le code a changé
  # Le version-server buildra ensuite à 03h30 avec la nouvelle version
  version-watchdog:
    build:
      context: ./scripts
      dockerfile: ../docker/version-watchdog/Dockerfile
    container_name: animeguesser-version-watchdog
    restart: unless-stopped
    volumes:
      - ./animeguesser/frontend:/app/frontend
    environment:
      TZ: ${TZ:-Europe/Paris}
    labels:
      - "animeguesser.service=version-watchdog"
