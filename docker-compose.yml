version: "3.9"

# ─────────────────────────────────────────────────────────
#  AnimeGuesser — Infrastructure
#
#  Structure du repo :
#  anime_guesser/
#  ├── docker-compose.yml   ← CE fichier
#  ├── docker/              ← configs infra uniquement
#  ├── frontend/            ← code SolidJS (intact, pas touché)
#  └── backend/             ← code Laravel  (intact, pas touché)
#
#  Rien n'est installé sur la machine hôte.
#  Node, npm, Composer, PHP → tout tourne dans Docker.
# ─────────────────────────────────────────────────────────

networks:
  animeguesser:
    driver: bridge

volumes:
  db_data:

services:

  # ── BASE DE DONNÉES ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: animeguesser-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_DATABASE:-anime_guesser}
      MYSQL_USER:          ${DB_USERNAME:-animeguesser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - animeguesser
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── BACKEND LARAVEL ──────────────────────────────────────
  # context = ./backend  → racine du projet Laravel
  # dockerfile séparé dans docker/  → ne pollue pas le projet
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: animeguesser-backend
    restart: unless-stopped
    environment:
      APP_ENV:      production
      APP_KEY:      ${APP_KEY:-base64:7GV2voKTq+KgTL3dyPQKohsRb2f9/v+8asOXsL09Nlg=}
      APP_DEBUG:    "false"
      APP_URL:      http://localhost
      DB_CONNECTION: mysql
      DB_HOST:      db
      DB_PORT:      3306
      DB_DATABASE:  ${DB_DATABASE:-anime_guesser}
      DB_USERNAME:  ${DB_USERNAME:-animeguesser}
      DB_PASSWORD:  ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - animeguesser
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M
    labels:
      - "animeguesser.service=backend"
      - "animeguesser.managed=true"

  # ── FRONTEND 1 ───────────────────────────────────────────
  frontend-1:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: animeguesser-frontend-1
    restart: unless-stopped
    networks:
      - animeguesser
    labels:
      - "animeguesser.service=frontend"
      - "animeguesser.managed=true"
      - "animeguesser.replica=1"

  # ── FRONTEND 2 ───────────────────────────────────────────
  frontend-2:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: animeguesser-frontend-2
    restart: unless-stopped
    networks:
      - animeguesser
    labels:
      - "animeguesser.service=frontend"
      - "animeguesser.managed=true"
      - "animeguesser.replica=2"

  # ── LOAD BALANCER ────────────────────────────────────────
  nginx-lb:
    build:
      context: ./docker/nginx-lb
    container_name: animeguesser-lb
    restart: unless-stopped
    ports:
      - "${LB_PORT:-8080}:80"
    depends_on:
      - frontend-1
      - frontend-2
      - backend
    networks:
      - animeguesser
    volumes:
      - ./docker/nginx-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "animeguesser.service=loadbalancer"

  # ── DASHBOARD ────────────────────────────────────────────
  dashboard:
    build:
      context: ./docker/dashboard
    container_name: animeguesser-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/nginx-lb:/lb-config
    networks:
      - animeguesser
    environment:
      DOCKER_NETWORK:  anime_guesser_animeguesser
      LB_CONFIG_PATH:  /lb-config/nginx.conf
      LB_CONTAINER:    animeguesser-lb
    labels:
      - "animeguesser.service=dashboard"
